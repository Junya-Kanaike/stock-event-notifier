name: poll_tdnet

on:
  schedule:
    # JST weekdays 08:03-08:53. Odd offsets reduce GitHub cron congestion.
    - cron: "3,13,23,33,43,53 23 * * 0-4"
    # JST weekdays 09:03-19:53
    - cron: "3,13,23,33,43,53 0-10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: event-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Tokyo
      SLACK_WEBHOOK_PO: ${{ secrets.SLACK_WEBHOOK_PO }}
      SLACK_WEBHOOK_IPO: ${{ secrets.SLACK_WEBHOOK_IPO }}
      SLACK_WEBHOOK_BUNBAI: ${{ secrets.SLACK_WEBHOOK_BUNBAI }}
      SLACK_WEBHOOK_CB: ${{ secrets.SLACK_WEBHOOK_CB }}
      SLACK_WEBHOOK_SPLIT: ${{ secrets.SLACK_WEBHOOK_SPLIT }}
      SLACK_WEBHOOK_SYSTEM: ${{ secrets.SLACK_WEBHOOK_SYSTEM }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Poll TDnet
        run: python -m src.run_poll
      - name: Commit state changes
        if: always()
        run: bash scripts/commit_state.sh
