name: daily_morning

on:
  schedule:
    # JST weekdays 07:30
    - cron: "30 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: event-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Tokyo
      SLACK_WEBHOOK_PO: ${{ secrets.SLACK_WEBHOOK_PO }}
      SLACK_WEBHOOK_IPO: ${{ secrets.SLACK_WEBHOOK_IPO }}
      SLACK_WEBHOOK_BUNBAI: ${{ secrets.SLACK_WEBHOOK_BUNBAI }}
      SLACK_WEBHOOK_CB: ${{ secrets.SLACK_WEBHOOK_CB }}
      SLACK_WEBHOOK_SPLIT: ${{ secrets.SLACK_WEBHOOK_SPLIT }}
      SLACK_WEBHOOK_SYSTEM: ${{ secrets.SLACK_WEBHOOK_SYSTEM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Send daily notifications
        run: python -m src.run_daily
      - name: Commit state changes
        if: always()
        run: bash scripts/commit_state.sh
