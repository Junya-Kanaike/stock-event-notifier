name: test_notify

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_PO: ${{ secrets.SLACK_WEBHOOK_PO }}
      SLACK_WEBHOOK_IPO: ${{ secrets.SLACK_WEBHOOK_IPO }}
      SLACK_WEBHOOK_BUNBAI: ${{ secrets.SLACK_WEBHOOK_BUNBAI }}
      SLACK_WEBHOOK_CB: ${{ secrets.SLACK_WEBHOOK_CB }}
      SLACK_WEBHOOK_SPLIT: ${{ secrets.SLACK_WEBHOOK_SPLIT }}
      SLACK_WEBHOOK_SYSTEM: ${{ secrets.SLACK_WEBHOOK_SYSTEM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Send test notifications
        run: |
          python - <<'EOF'
          from src.notifiers.slack import SlackNotifier
          labels = {"ipo": "IPO", "po": "PO", "bunbai": "BUNBAI", "cb": "CB", "split": "SPLIT", "system": "SYSTEM"}
          n = SlackNotifier(dry_run=False)
          for t, label in labels.items():
              n.send(t, ":white_check_mark: Test notification for [" + label + "] channel. If you can see this, the setup is OK!", header="TEST")
              print("sent test to " + t)
          EOF
