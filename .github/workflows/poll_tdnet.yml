name: poll_tdnet

on:
  schedule:
    # JST weekdays 08:00-08:50
    - cron: "*/10 23 * * 0-4"
    # JST weekdays 09:00-19:50
    - cron: "*/10 0-10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: event-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      SLACK_WEBHOOK_PO: ${{ secrets.SLACK_WEBHOOK_PO }}
      SLACK_WEBHOOK_IPO: ${{ secrets.SLACK_WEBHOOK_IPO }}
      SLACK_WEBHOOK_BUNBAI: ${{ secrets.SLACK_WEBHOOK_BUNBAI }}
      SLACK_WEBHOOK_CB: ${{ secrets.SLACK_WEBHOOK_CB }}
      SLACK_WEBHOOK_SPLIT: ${{ secrets.SLACK_WEBHOOK_SPLIT }}
      SLACK_WEBHOOK_SYSTEM: ${{ secrets.SLACK_WEBHOOK_SYSTEM }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Poll TDnet
        run: python -m src.run_poll
      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain state)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state
            git commit -m "Update event state"
            git push
          fi
