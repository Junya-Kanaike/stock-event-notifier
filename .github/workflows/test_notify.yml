name: test_notify

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_PO: ${{ secrets.SLACK_WEBHOOK_PO }}
      SLACK_WEBHOOK_IPO: ${{ secrets.SLACK_WEBHOOK_IPO }}
      SLACK_WEBHOOK_BUNBAI: ${{ secrets.SLACK_WEBHOOK_BUNBAI }}
      SLACK_WEBHOOK_CB: ${{ secrets.SLACK_WEBHOOK_CB }}
      SLACK_WEBHOOK_SPLIT: ${{ secrets.SLACK_WEBHOOK_SPLIT }}
      SLACK_WEBHOOK_SYSTEM: ${{ secrets.SLACK_WEBHOOK_SYSTEM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Send test notifications
        run: |
          python - <<'EOF'
          from src.notifiers.slack import SlackNotifier
          labels = {"ipo": "忙聳掳猫娄聫盲赂聤氓聽麓(IPO)", "po": "氓聟卢氓聥聼氓垄聴猫鲁聡(PO)", "bunbai": "莽芦聥盲录職氓陇聳氓聢聠氓拢虏", "cb": "猫禄垄忙聫聸莽陇戮氓聜碌(CB)", "split": "忙聽陋氓录聫氓聢聠氓聣虏", "system": "茫聜路茫聜鹿茫聝聠茫聝聽/茫聜篓茫聝漏茫聝录"}
          n = SlackNotifier(dry_run=False)
          for t, label in labels.items():
              n.send(t, ":white_check_mark: 茫聛聯茫聜聦茫聛炉 *" + label + "* 茫聝聛茫聝拢茫聝鲁茫聝聧茫聝芦茫聛庐茫聝聠茫聜鹿茫聝聢茅聙職莽聼楼茫聛搂茫聛聶茫聙聜氓卤聤茫聛聞茫聛娄茫聛聞茫聜聦茫聛掳猫篓颅氓庐職忙聢聬氓聤聼茫聛搂茫聛聶茂录聛", header="茫聝聠茫聜鹿茫聝聢茅聙職莽聼楼")
              print("sent test to " + t)
          EOF
